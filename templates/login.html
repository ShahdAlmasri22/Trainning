<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    width: 100%;
    max-width: 400px;
}

.card {
    background: #fff;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    text-align: center;
}

.card h2 {
    margin-bottom: 25px;
    color: #333;
}

.input-group {
    margin-bottom: 15px;
}

.input-group input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #667eea;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5563c1;
}

.switch {
    margin-top: 15px;
    font-size: 14px;
}

.switch a {
    color: #667eea;
    text-decoration: none;
}

#message {
    margin-top: 15px;
    margin-bottom: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
   <div class="card">
    <h2>Login</h2>

    <p id="message"></p>

   <form id="signinForm">
      <div class="input-group">
        <input type="email" id="email" autocomplete="off" placeholder="Email Address" required>
      </div>
      <div class="input-group">
        <input type="password" id="password" autocomplete="off" placeholder="Password" required>
      </div>
      <button type="submit">Sign-in</button>
    </form>

    <p class="switch">
        Don't have an account? <a href="/users">Sign Up</a>
    </p>
   </div>
</div>


<script>
   document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("signinForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            message.style.color = "red";
            message.innerText = "Please fill all fields!";
            return;
        }

        try {
            const response = await fetch("/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: email,
                password: password
            })
            });

            const data = await response.json();

            const displayMessage = data.message || JSON.stringify(data);

        if (response.ok) {
            message.style.color = "green";
            message.innerText = displayMessage;

            if (data.access_token) localStorage.setItem("access_token", data.access_token);
            if (data.refresh_token) localStorage.setItem("refresh_token", data.refresh_token);
            if (data.user_id) localStorage.setItem("user_id", data.user_id);

            setTimeout(() => {
                window.location.href = "/tasks";
            }, 1500);
        } else {
            message.style.color = "red";
            message.innerText = displayMessage;
        }
    } catch (err) {
        message.style.color = "red";
        message.innerText = "❌ Server connection error";
        console.error(err);
    }
});
});
</script>
</body>
</html>
